<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>汉诺塔递归调用树（修复错位）</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
  }
  #controls {
    margin: 20px;
  }
  button, input {
    padding: 8px 14px;
    margin: 5px;
    font-size: 16px;
  }
  #tree {
    position: relative;
    width: 100%;
    min-height: 800px;
    margin: 0 auto;
  }
  .node {
    position: absolute;
    width: 220px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-weight: bold;
    font-size: 14px;
    background: #66bb6a;
    color: white;
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    transform: translateX(-50%);  /* 关键：以中心对齐 */
    text-align: center;
    padding: 0 8px;
  }
  .active {
    background: #ffa726;
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }
  svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .call {
    stroke: #1e88e5;
    stroke-width: 3;
    fill: none;
    marker-end: url(#arrowBlue);
  }
  .ret {
    stroke: #e53935;
    stroke-width: 3;
    fill: none;
    marker-end: url(#arrowRed);
  }
</style>
</head>

<body>

<h2>汉诺塔递归调用过程（调用树）</h2>

<div id="controls">
  n = <input type="number" id="n" value="3" min="1" max="7">
  <button onclick="start()">开始</button>
  <button onclick="pause()">暂停</button>
  <button onclick="step()">单步</button>
  <button onclick="reset()">重置</button>
</div>

<div id="tree">
  <svg id="lines">
    <defs>
      <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
        <polygon points="0 0, 12 3, 0 6" fill="#1e88e5"/>
      </marker>
      <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
        <polygon points="0 0, 12 3, 0 6" fill="#e53935"/>
      </marker>
    </defs>
  </svg>
</div>

<script>
const NODE_W = 220;
const NODE_H = 48;
const VERTICAL_GAP = 120;

let nodes = [];
let nodeMap = {};
let steps = [];
let index = 0;
let timer = null;

function buildTree(n, a, b, c, x, y, offset, id) {
  const node = { id, n, a, b, c, x, y, left: null, right: null };
  nodes.push(node);
  nodeMap[id] = node;

  if (n > 1) {
    // 左子树（第一个递归调用）
    node.left = buildTree(n-1, a, c, b, x - offset, y + VERTICAL_GAP, offset / 2, id + "L");
    // 右子树（第二个递归调用）
    node.right = buildTree(n-1, c, b, a, x + offset, y + VERTICAL_GAP, offset / 2, id + "R");
  }

  return node;
}

function drawNodes() {
  const container = document.getElementById("tree");
  nodes.forEach(node => {
    const div = document.createElement("div");
    div.className = "node";
    div.innerText = `Hanoi(${node.n}, ${node.a}→${node.b}, ${node.c})`;
    div.style.left = node.x + "px";
    div.style.top = node.y + "px";
    container.appendChild(div);
    node.el = div;
  });
}

function getCenter(node) {
  return {
    x: node.x + NODE_W / 2,
    y: node.y + NODE_H / 2
  };
}

function drawEdge(fromNode, toNode, type) {
  const c1 = getCenter(fromNode);
  const c2 = getCenter(toNode);

  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", c1.x);
  line.setAttribute("y1", c1.y);
  line.setAttribute("x2", c2.x);
  line.setAttribute("y2", c2.y);
  line.setAttribute("class", type);
  document.getElementById("lines").appendChild(line);
}

function buildSteps(node) {
  steps.push({ type: "call", id: node.id });

  if (node.left) {
    steps.push({ type: "callEdge", from: node.id, to: node.left.id });
    buildSteps(node.left);
  }

  if (node.right) {
    steps.push({ type: "callEdge", from: node.id, to: node.right.id });
    buildSteps(node.right);
  }

  steps.push({ type: "return", id: node.id });
}

function runStep() {
  if (index >= steps.length) {
    clearInterval(timer);
    return;
  }

  const s = steps[index];

  if (s.type === "call") {
    nodeMap[s.id].el.classList.add("active");
  }

  if (s.type === "callEdge") {
    drawEdge(nodeMap[s.from], nodeMap[s.to], "call");
  }

  if (s.type === "return") {
    const node = nodeMap[s.id];
    node.el.classList.remove("active");

    // 画返回箭头（指向父节点）
    if (s.id !== "root") {
      const parentId = s.id.slice(0, -1);
      if (nodeMap[parentId]) {
        drawEdge(node, nodeMap[parentId], "ret");
      }
    }
  }

  index++;
}

function start() {
  reset();

  const n = parseInt(document.getElementById("n").value);
  if (isNaN(n) || n < 1) return;

  // 容器宽度动态获取，更准确居中
  const containerWidth = document.getElementById("tree").offsetWidth;
  const rootX = containerWidth / 2;
  const rootY = 40;
  const offset = Math.max(180, containerWidth / 5);

  buildTree(n, "A", "B", "C", rootX, rootY, offset, "root");

  drawNodes();
  buildSteps(nodeMap["root"]);

  timer = setInterval(runStep, 900);
}

function pause() {
  clearInterval(timer);
}

function step() {
  runStep();
}

function reset() {
  clearInterval(timer);
  nodes = [];
  nodeMap = {};
  steps = [];
  index = 0;

  // 清空节点和连线
  const tree = document.getElementById("tree");
  tree.innerHTML = '<svg id="lines"></svg>';

  // 重新插入 defs（箭头定义）
  const svg = document.getElementById("lines");
  svg.innerHTML = `
    <defs>
      <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
        <polygon points="0 0, 12 3, 0 6" fill="#1e88e5"/>
      </marker>
      <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
        <polygon points="0 0, 12 3, 0 6" fill="#e53935"/>
      </marker>
    </defs>
  `;
}

window.addEventListener("resize", reset);
</script>

</body>
</html>
