<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traceback + S Table Animation</title>
<style>
body { font-family: Arial; display: flex; }

#left { width: 30%; text-align: center; }
#middle { width: 40%; text-align: center; }
#right { width: 30%; padding: 10px; }

table { border-collapse: collapse; margin: auto; }
td {
    width: 40px; height: 35px;
    border: 1px solid #333;
    text-align: center;
}

.highlight { background: #ffd54f; }

.node {
    display: inline-block;
    border: 1px solid #333;
    padding: 6px;
    margin: 5px;
    border-radius: 6px;
}

.active { background: #ffd54f; }
.done { background: #81c784; }

button { padding: 10px 20px; margin: 10px; }
</style>
</head>

<body>

<!-- 左：S表 -->
<div id="left">
<h3>S 表</h3>
<table id="sTable"></table>
</div>

<!-- 中：递归树 -->
<div id="middle">
<h3>递归树</h3>
<button onclick="nextStep()">下一步 ▶</button>
<div id="tree"></div>
</div>

<!-- 右：输出 -->
<div id="right">
<h3>输出顺序</h3>
<div id="output"></div>
<p id="info"></p>
</div>

<script>
let s = [
[],
[0,0,1,1,3,3,3],
[0,0,0,2,3,3,3],
[0,0,0,0,3,3,3],
[0,0,0,0,0,4,5],
[0,0,0,0,0,0,5],
[0,0,0,0,0,0,0]
];

let n = 6;

// ====== 绘制 S 表 ======
function drawSTable() {
    let table = document.getElementById("sTable");
    table.innerHTML = "";

    for (let i = 1; i <= n; i++) {
        let tr = document.createElement("tr");
        for (let j = 1; j <= n; j++) {
            let td = document.createElement("td");
            td.innerText = (j > i) ? s[i][j] : "";
            td.id = `s-${i}-${j}`;
            tr.appendChild(td);
        }
        table.appendChild(tr);
    }
}

drawSTable();

// ====== 构建递归树 ======
function buildTree(i, j) {
    let node = { i, j, children: [] };

    if (i !== j) {
        let k = s[i][j];
        node.children.push(buildTree(i, k));
        node.children.push(buildTree(k+1, j));
    }
    return node;
}

let root = buildTree(1, 6);

// ====== 渲染树 ======
function renderTree(node) {
    let div = document.createElement("div");
    div.className = "node";
    div.id = `node-${node.i}-${node.j}`;
    div.innerText = `(${node.i},${node.j})`;

    if (node.children.length > 0) {
        let childDiv = document.createElement("div");
        node.children.forEach(c => childDiv.appendChild(renderTree(c)));
        div.appendChild(childDiv);
    }

    return div;
}

document.getElementById("tree").appendChild(renderTree(root));

// ====== 生成步骤（后序） ======
let steps = [];

function generate(node) {
    steps.push({type:"visit", i:node.i, j:node.j});

    if (node.children.length === 0) {
        steps.push({type:"return", i:node.i, j:node.j});
        return;
    }

    generate(node.children[0]);
    generate(node.children[1]);

    steps.push({
        type:"print",
        i:node.i,
        j:node.j,
        k:s[node.i][node.j]
    });
}

generate(root);

let stepIndex = 0;
let output = [];

// ====== 清除高亮 ======
function clearAll() {
    document.querySelectorAll(".node").forEach(n=>{
        n.classList.remove("active");
    });
    document.querySelectorAll("td").forEach(td=>{
        td.classList.remove("highlight");
    });
}

// ====== 下一步 ======
function nextStep() {
    if (stepIndex >= steps.length) return;

    clearAll();

    let step = steps[stepIndex];
    let node = document.getElementById(`node-${step.i}-${step.j}`);
    let cell = document.getElementById(`s-${step.i}-${step.j}`);

    if (step.type === "visit") {
        node.classList.add("active");

        if (cell) cell.classList.add("highlight");

        let k = s[step.i][step.j];
        document.getElementById("info").innerText =
            `访问 (${step.i},${step.j})，k = ${k}`;
    }

    if (step.type === "return") {
        node.classList.add("done");
        document.getElementById("info").innerText =
            `返回 (${step.i},${step.j})`;
    }

    if (step.type === "print") {
        node.classList.add("done");

        let text = `Multiply A${step.i}...${step.k} and A${step.k+1}...${step.j}`;
        output.push(text);

        document.getElementById("output").innerHTML = output.join("<br>");
        document.getElementById("info").innerText = text;

        let cell = document.getElementById(`s-${step.i}-${step.j}`);
        if (cell) cell.classList.add("highlight");
    }

    stepIndex++;
}
</script>

</body>
</html>
