<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Hanoi Tower Animation</title>
<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
#controls{margin:20px}
#board{display:flex;justify-content:space-around;align-items:flex-end;height:300px;margin:20px}

/* 柱子 */
.rod{
 width:30%;
 height:250px;
 border-bottom:6px solid #333; /* 横线放到柱子底部 */
 position:relative;
 display:flex;
 flex-direction:column;
 justify-content:flex-end; /* 盘子向下对齐 */
 align-items:center;
}

/* 竖柱 */
.rod::after{
 content:"";
 position:absolute;
 left:50%;
 transform:translateX(-50%);
 bottom:0;
 width:8px;
 height:230px;
 background:#333
}

.disk{
 height:20px;
 margin:2px 0;
 border-radius:4px;
 color:#fff;
 font-size:12px;
 display:flex;
 align-items:center;
 justify-content:center
}

#moves{font-size:18px;margin-top:10px}
</style>
</head>
<body>

<h2>Hanoi Tower 动画</h2>

<div id="controls">
盘子数量: <input type="number" id="diskCount" min="1" max="10" value="4">
<button onclick="start()">开始</button>
<button onclick="reset()">重置</button>
</div>

<div id="board">
<div class="rod" id="rod0"></div>
<div class="rod" id="rod1"></div>
<div class="rod" id="rod2"></div>
</div>

<div id="moves">Moves: 0</div>

<script>
let rods=[[],[],[]]
let moves=0
let moveList=[]
let diskN=4

function createDisks(){
 rods=[[],[],[]]
 document.querySelectorAll('.rod').forEach(r=>r.innerHTML="")
 for(let i=diskN;i>=1;i--){
  rods[0].push(i)
 }
 render()
}

function render(){
 document.querySelectorAll('.rod').forEach(r=>r.innerHTML="")
 rods.forEach((rod,ri)=>{

  [...rod].reverse().forEach(d=>{
   const el=document.createElement("div")
   el.className="disk"
   el.style.width=(40+d*15)+"px"
   el.style.background=`hsl(${d*40},70%,50%)`
   el.textContent=d
   document.getElementById("rod"+ri).appendChild(el)
  })

 })
}

function hanoi(n,from,aux,to){
 if(n===1){
  moveList.push([from,to])
  return
 }
 hanoi(n-1,from,to,aux)
 moveList.push([from,to])
 hanoi(n-1,aux,from,to)
}

async function play(){
 for(const m of moveList){
  await new Promise(r=>setTimeout(r,800))
  const disk=rods[m[0]].pop()
  rods[m[1]].push(disk)
  moves++
  document.getElementById("moves").innerText="Moves: "+moves
  render()
 }
}

function start(){
 reset()
 diskN=parseInt(document.getElementById("diskCount").value)
 createDisks()
 moveList=[]
 hanoi(diskN,0,1,2)
 play()
}

function reset(){
 moves=0
 moveList=[]
 document.getElementById("moves").innerText="Moves: 0"
 diskN=parseInt(document.getElementById("diskCount").value)
 createDisks()
}

createDisks()
</script>

</body>
</html>
