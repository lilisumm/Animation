<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<title>递归树动画 - 阶乘</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#f5f5f5;
}

h2{
    margin-top:20px;
}

#controls{
    margin:20px;
}

button{
    padding:8px 14px;
    margin:5px;
}

#tree{
    position:relative;
    margin:auto;
    width:600px;
    min-height:420px;
}

.node{
    position:absolute;
    padding:10px 16px;
    border-radius:6px;
    background:#4da3ff;
    color:white;
    font-weight:bold;
}

.return{
    background:#4CAF50;
}

svg{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

#lineLayer line{
    stroke:#555;
    stroke-width:2;
}

#formula{
    margin-top:20px;
    font-size:18px;
    color:#333;
}

</style>

</head>

<body>

<h2>阶乘递归树动画</h2>

<div id="controls">

n = <input type="number" id="n" value="5" min="1" max="10">

<button onclick="start()">开始</button> <button onclick="pause()">暂停</button> <button onclick="step()">单步</button> <button onclick="reset()">重置</button>

</div>

<div id="formula">
n! = n × (n−1)!
</div>

<div id="tree">
<svg id="lineLayer"></svg>
</div>

<script>

let steps=[]
let index=0
let timer=null
let nodes=[]
let result=1

function buildSteps(n){

    steps=[]

    for(let i=n;i>=1;i--){
        steps.push({type:"call",value:i})
    }

    for(let i=1;i<=n;i++){
        steps.push({type:"return",value:i})
    }

}

function addNode(text,level){

    const tree=document.getElementById("tree")

    const node=document.createElement("div")
    node.className="node"
    node.innerText=text

    const x=260
    const y=level*70+20

    node.style.left=x+"px"
    node.style.top=y+"px"

    tree.appendChild(node)

    nodes.push({x:x+60,y:y+20})

    if(nodes.length>1){

        const prev=nodes[nodes.length-2]
        const curr=nodes[nodes.length-1]

        const line=document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line"
        )

        line.setAttribute("x1",prev.x)
        line.setAttribute("y1",prev.y)

        line.setAttribute("x2",curr.x)
        line.setAttribute("y2",curr.y)

        document.getElementById("lineLayer")
        .appendChild(line)
    }
}

function addReturn(text,level){

    const tree=document.getElementById("tree")

    const node=document.createElement("div")
    node.className="node return"
    node.innerText=text

    const x=420
    const y=level*70-40

    node.style.left=x+"px"
    node.style.top=y+"px"

    tree.appendChild(node)
}

function runStep(){

    if(index>=steps.length){
        clearInterval(timer)
        return
    }

    const step=steps[index]

    if(step.type==="call"){

        addNode(
            "factorial("+step.value+")",
            index
        )
    }

    else{

        result*=step.value

        addReturn(
            "return "+result,
            steps.length-index
        )
    }

    index++
}

function start(){

    reset()

    const n=parseInt(
        document.getElementById("n").value
    )

    buildSteps(n)

    timer=setInterval(runStep,800)
}

function pause(){

    clearInterval(timer)
}

function step(){

    runStep()
}

function reset(){

    clearInterval(timer)

    index=0
    nodes=[]
    result=1

    document.getElementById("tree").innerHTML=
        '<svg id="lineLayer"></svg>'
}

</script>

</body>
</html>
